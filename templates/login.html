<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ResumeIQ | Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#0F172A,#1E3A8A,#2563EB);

}

.login-card{

    width:430px;

    background:white;

    padding:45px;

    border-radius:25px;

    box-shadow:0 20px 50px rgba(0,0,0,.25);

    text-align:center;

    animation:fade .8s;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(50px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.logo{

width:95px;

margin-bottom:10px;

}

h1{

font-size:38px;

color:#1E3A8A;

margin-bottom:8px;

}

.tag{

color:#64748B;

font-size:15px;

margin-bottom:30px;

}

.input-box{

position:relative;

margin-bottom:18px;

}

.input-box i{

position:absolute;

left:18px;

top:17px;

color:#2563EB;

font-size:18px;

}

.input-box input{

width:100%;

padding:15px 15px 15px 48px;

border:2px solid #E2E8F0;

border-radius:12px;

font-size:15px;

outline:none;

transition:.3s;

}

.input-box input:focus{

border-color:#2563EB;

box-shadow:0 0 12px rgba(37,99,235,.25);

}

.options{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

font-size:14px;

}

.options a{

text-decoration:none;

color:#2563EB;

font-weight:600;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

font-size:18px;

font-weight:600;

background:linear-gradient(90deg,#2563EB,#7C3AED);

color:white;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:translateY(-3px);

box-shadow:0 15px 30px rgba(37,99,235,.3);

}

.register{

margin-top:25px;

font-size:15px;

}

.register a{

text-decoration:none;

font-weight:600;

color:#2563EB;

}

.footer{

margin-top:25px;

color:#94A3B8;

font-size:13px;

}

    </style>

</head>

<body>

<div class="login-card">

<img src="{{ url_for('static', filename='images/logo.png') }}" class="logo">

<h1>ResumeIQ</h1>

<p class="tag">
Analyze Smarter. Get Hired Faster.
</p>

<form action="/home">

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
placeholder="Email Address"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
placeholder="Password"
required>

</div>

<div class="options">

<label>

<input type="checkbox">

 Remember me

</label>

<a href="#">Forgot Password?</a>

</div>

<button>

<i class="fa-solid fa-right-to-bracket"></i>

 Login

</button>

</form>

<div class="register">

New User?

<a href="/register">

Create Account

</a>

</div>

<div class="footer">

© 2026 ResumeIQ AI Platform

</div>

</div>

</body>

</html>
