<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ResumeIQ | Feedback</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}


body{

    min-height:100vh;
    background:linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    display:flex;
    justify-content:center;
    align-items:center;

}



.container{

    width:90%;
    max-width:600px;
    background:white;
    padding:40px;

    border-radius:25px;

    box-shadow:
    0 20px 40px rgba(0,0,0,.2);

}



h1{

    text-align:center;
    color:#2563eb;
    margin-bottom:10px;

}


.subtitle{

    text-align:center;
    color:#64748b;
    margin-bottom:30px;

}



.rating{

    display:flex;
    justify-content:center;
    gap:15px;
    margin:25px 0;

}



.rating input{

    display:none;

}



.rating label{

    font-size:35px;
    cursor:pointer;
    color:#cbd5e1;

}



.rating input:checked ~ label{

    color:#facc15;

}



textarea{

    width:100%;
    height:130px;

    padding:15px;

    border-radius:15px;

    border:1px solid #cbd5e1;

    resize:none;

    font-size:15px;

}



button{

    width:100%;

    margin-top:25px;

    padding:15px;

    border:none;

    border-radius:15px;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    color:white;

    font-size:16px;

    cursor:pointer;

}


button:hover{

    opacity:.9;

}



.success{

    margin-top:20px;

    text-align:center;

    color:#16a34a;

}



</style>


</head>


<body>


<div class="container">


<h1>
Share Your Feedback
</h1>


<p class="subtitle">
Help us improve ResumeIQ AI Analyzer
</p>



<form>



<div class="rating">


<input type="radio" id="star5" name="rating">
<label for="star5">★</label>


<input type="radio" id="star4" name="rating">
<label for="star4">★</label>


<input type="radio" id="star3" name="rating">
<label for="star3">★</label>


<input type="radio" id="star2" name="rating">
<label for="star2">★</label>


<input type="radio" id="star1" name="rating">
<label for="star1">★</label>


</div>



<textarea placeholder="Write your feedback here..."></textarea>



<button type="submit">

Submit Feedback

</button>



</form>



<p class="success">

Thank you for using ResumeIQ ❤️

</p>



</div>



</body>

</html>
